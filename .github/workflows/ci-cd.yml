# This workflow defines the CI/CD pipeline for the BodaKitaa Frontend application.
# It covers Task 2 (CI), Task 3 (CD), and Task 4 (Monitoring) of the CS 421 assignment.

name: Bodakitaa Frontend CI/CD Pipeline

on:
  push:
    # Trigger the pipeline automatically when code is pushed to the main or master branches.
    branches: [ "main", "master" ]
  pull_request:
    # Trigger the pipeline when a pull request is created.
    branches: [ "main", "master" ]

jobs:
  # ==========================================
  # TASK 2: CONTINUOUS INTEGRATION (CI)
  # ==========================================
  ci-testing:
    name: "Task 2: Continuous Integration"
    runs-on: ubuntu-latest
    steps:
      # Step 1: Download the source code.
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js environment for React/Vite.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3: Install all frontend dependencies from package.json.
      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # Step 4: Run Vitest unit tests to ensure UI logic is correct.
      # The pipeline will stop here if any test fails (Assignment Requirement).
      - name: Run Unit Tests
        run: |
          npm test

  # ==========================================
  # TASK 3: CONTINUOUS DEPLOYMENT (CD) - Staging
  # ==========================================
  build-and-deploy-staging:
    name: "Task 3.1: Staging Deployment"
    needs: ci-testing
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 1: Login to Docker Hub using secrets.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 2: Setup Docker Buildx.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Build the production Nginx image and push it to Docker Hub.
      # Tags :latest and :v1 are used as per Task 4.
      - name: Build and push (Task 4: Image Tagging)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/bodakitaa-fe:latest
            ${{ secrets.DOCKER_USERNAME }}/bodakitaa-fe:v1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step 4: SSH into the server and deploy the staging container.
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/bodaboda/staging
            cd ~/bodaboda/staging
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            # Stop legacy frontend containers to avoid port conflicts.
            docker stop bodakitaa-fe-fe-prod-1 bodakitaa-fe-fe-dev-1 2>/dev/null || true
            docker rm bodakitaa-fe-fe-prod-1 bodakitaa-fe-fe-dev-1 2>/dev/null || true
            # Deploy using a unique project name (-p) to avoid interfering with the backend.
            docker compose -p bodakitaa-fe -f ../docker-compose.frontend.yml pull frontend
            docker compose -p bodakitaa-fe -f ../docker-compose.frontend.yml up -d --remove-orphans frontend
            echo "STAGING DEPLOYMENT SUCCESSFUL"
            docker ps | grep bodakitaa-fe

  # ==========================================
  # TASK 3: CONTINUOUS DEPLOYMENT (CD) - Production
  # ==========================================
  deploy-production:
    name: "Task 3.2: Production Deployment"
    needs: build-and-deploy-staging
    runs-on: ubuntu-latest
    # This environment "production" triggers the Manual Approval Gate (Task 3.2).
    environment: production 
    steps:
      # Step 1: Deploy to the live production server.
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/bodaboda
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            # Cleanup legacy production containers.
            docker stop bodakitaa-fe-fe-prod-1 bodakitaa-fe-fe-dev-1 2>/dev/null || true
            docker rm bodakitaa-fe-fe-prod-1 bodakitaa-fe-fe-dev-1 2>/dev/null || true
            # Deploy the final production container.
            docker compose -p bodakitaa-fe -f docker-compose.frontend.yml pull frontend
            docker compose -p bodakitaa-fe -f docker-compose.frontend.yml up -d
            docker image prune -f
            echo "PRODUCTION DEPLOYMENT SUCCESSFUL"

      # ==========================================
      # TASK 4: DOCKER MANAGEMENT & MONITORING
      # ==========================================
      # Step 2: Show logs and stats to fulfill Monitoring requirements.
      - name: Collect Monitoring Logs
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- APPLICATION LOGS (TASK 4: MONITORING) ---"
            docker logs --tail 20 bodakitaa-fe
            echo "--- CONTAINER RESOURCE USAGE ---"
            docker stats bodakitaa-fe --no-stream
